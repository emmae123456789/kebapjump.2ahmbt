<!DOCTYPE html>
<html>
<body>

    <canvas id="game" width="600" height="200"></canvas>

    <script>
        const canvas = document.getElementById("game");
        const ctx = canvas.getContext("2d");

        // Spielstatus
        let gameStarted = false;

        // Dino
        let dino = {
            x: 50,
            y: 150,
            width: 30,
            height: 30,
            velocityY: 0,
            jumping: false
        };

        // Hindernis
        let obstacle = {
            x: 600,
            y: 150,
            width: 20,
            height: 40,
            speed: 5
        };

        // Einstellungen für Geschwindigkeit
        let speedIncrease = 0.5;
        let maxSpeed = 40;

        const gravity = 1;

        // Steuerung
        document.addEventListener("keydown", function (e) {
            if (e.code === "Space") {

                // Start
                if (!gameStarted) {
                    gameStarted = true;
                    return;
                }

                // Springen
                if (!dino.jumping) {
                    dino.velocityY = -15;
                    dino.jumping = true;
                }
            }
        });

        function update() {
            if (!gameStarted) return;

            // Dino Bewegung
            dino.y += dino.velocityY;
            dino.velocityY += gravity;

            if (dino.y >= 150) {
                dino.y = 150;
                dino.jumping = false;
            }

            // Hindernis bewegt sich
            obstacle.x -= obstacle.speed;

            // 👉 HIER wird es schneller
            if (obstacle.speed < maxSpeed) {
                obstacle.speed += speedIncrease;
            }

            // Reset wenn weg
            if (obstacle.x < -20) {
                obstacle.x = 600;
            }

            // Kollision
            if (
                dino.x < obstacle.x + obstacle.width &&
                dino.x + dino.width > obstacle.x &&
                dino.y < obstacle.y + obstacle.height &&
                dino.y + dino.height > obstacle.y
            ) {
                alert("Game Over!");

                // Reset
                gameStarted = false;
                obstacle.x = 600;
                obstacle.speed = 5; // wichtig!
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Startscreen
            if (!gameStarted) {
                ctx.fillText("Drücke SPACE zum Starten", 180, 100);
                return;
            }

            // Dino
            ctx.fillRect(dino.x, dino.y, dino.width, dino.height);

            // Hindernis
            ctx.fillRect(obstacle.x, obstacle.y, obstacle.width, obstacle.height);
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        gameLoop();
    
    
    
    </script>

</body>
</html>
