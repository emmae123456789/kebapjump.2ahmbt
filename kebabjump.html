<!DOCTYPE html>

<html>
<head>
    <meta charset="UTF-8">
    <title>Dino Game</title>
    <style>

        body {
            margin: 0;
            background: #f7f7f7;
            overflow: hidden;
            font-family: Arial, sans-serif;
            text-align: center;
        }

        canvas {
            background: white;
            border: 2px solid black;
            margin-top: 20px;
        }
    </style>
</head>

<body>

    <h2>Press SPACE to jump — ENTER to restart</h2>

    <canvas id="game" width="800" height="300"></canvas>

    <script>

        const canvas = document.getElementById("game");

        const ctx = canvas.getContext("2d");

        let dino, obstacles, speed, score, gameOver, frame;

        function init() {

            dino = {

                x: 50,

                y: 220,

                width: 40,

                height: 40,

                vy: 0,

                gravity: 0.6,

                jump: -12,

                grounded: true

            };

            obstacles = [];

            speed = 6;

            score = 0;

            gameOver = false;

            frame = 0;

        }

        // Controls

        document.addEventListener("keydown", (e) => {

            if (e.code === "Space" && dino.grounded) {

                dino.vy = dino.jump;

                dino.grounded = false;

            }

            if (e.code === "Enter" && gameOver) {

                init();

            }

        });

        // Spawn obstacles

        function spawnObstacle() {

            let type = Math.random() < 0.7 ? "cactus" : "bird";

            obstacles.push({

                x: canvas.width,

                y: type === "cactus" ? 240 : 180,

                width: 30,

                height: 40,

                type: type

            });

        }

        // Collision detection

        function collide(a, b) {

            return (

                a.x < b.x + b.width &&

                a.x + a.width > b.x &&

                a.y < b.y + b.height &&

                a.y + a.height > b.y

            );

        }

        // Update game

        function update() {

            if (gameOver) return;

            frame++;

            // Physics

            dino.vy += dino.gravity;

            dino.y += dino.vy;

            if (dino.y >= 220) {

                dino.y = 220;

                dino.vy = 0;

                dino.grounded = true;

            }

            // Spawn obstacles

            if (frame % 90 === 0) {

                spawnObstacle();

            }

            // Move obstacles

            for (let i = 0; i < obstacles.length; i++) {

                obstacles[i].x -= speed;

                if (collide(dino, obstacles[i])) {

                    gameOver = true;

                }

            }

            // Remove off-screen

            obstacles = obstacles.filter(o => o.x > -50);

            // Increase difficulty

            if (frame % 300 === 0) {

                speed += 0.5;

            }

            score++;

        }

        // Draw everything

        function draw() {

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Ground

            ctx.beginPath();

            ctx.moveTo(0, 260);

            ctx.lineTo(canvas.width, 260);

            ctx.stroke();

            // Dino animation

            ctx.fillStyle = "black";

            if (frame % 20 < 10) {

                ctx.fillRect(dino.x, dino.y, dino.width, dino.height);

            } else {

                ctx.fillRect(dino.x, dino.y + 5, dino.width, dino.height - 5);

            }

            // Obstacles

            obstacles.forEach(o => {

                if (o.type === "cactus") {

                    ctx.fillRect(o.x, o.y, o.width, o.height);

                } else {

                    ctx.fillRect(o.x, o.y, o.width, o.height - 10);

                }

            });

            // Score

            ctx.fillText("Score: " + score, 650, 20);

            // Game over text

            if (gameOver) {

                ctx.fillText("GAME OVER - Press ENTER", 280, 150);

            }

        }

        // Game loop

        function loop() {

            update();

            draw();

            requestAnimationFrame(loop);

        }

        // Start game

        init();

        loop();
    </script>

</body>
</html>
