<!DOCTYPE html>
<html>

<body>

    <canvas id="game" width="600" height="200"></canvas>

    <script>

        let canvas = document.getElementById("game");
        let ctx = canvas.getContext("2d");

        let dinoY = 150;
        let speedY = 0;

        let cactusX = 600;

        let gravity = 1;
        let score = 0;

        let started = false;
        let gameOver = false;

        function game() {

            ctx.clearRect(0, 0, 600, 200);

            if (!started) {
                ctx.fillText("SPACE dr³cken zum Start", 200, 100);
                requestAnimationFrame(game);
                return;
            }

            if (gameOver) {
                ctx.fillText("Game Over", 260, 100);
                ctx.fillText("Score: " + score, 260, 130);
                requestAnimationFrame(game);
                return;
            }

            speedY += gravity;
            dinoY += speedY;

            if (dinoY > 150) {
                dinoY = 150;
                speedY = 0;
            }

            cactusX -= 5;

            if (cactusX < -20) {
                cactusX = 600;
                score++;
            }

            if (50 < cactusX + 20 && 80 > cactusX && dinoY + 30 > 160) {
                gameOver = true;
            }

            ctx.fillRect(50, dinoY, 30, 30);
            ctx.fillRect(cactusX, 160, 20, 40);

            ctx.fillText("Score: " + score, 10, 20);

            requestAnimationFrame(game);

        }

        document.addEventListener("keydown", function (e) {

            if (e.code == "Space") {

                if (!started) {
                    started = true;
                    return;
                }

                if (gameOver) {
                    location.reload();
                }

                if (dinoY == 150) {
                    speedY = -15;
                }

            }

        });

        game();

    </script>

</body>
</html>
